app = "qualitydb"
primary_region = "ams"

[build]

[env]
  DB_PATH = "/data/products.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "qualitydb_data"
  destination = "/data"
  initial_size = "1gb"
